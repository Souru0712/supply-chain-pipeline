name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-type-test:
    name: Ruff · Mypy · Pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          pip install \
            ruff==0.4.10 \
            mypy==1.10.0 \
            pytest==8.2.2 \
            lightgbm>=4.0 \
            pandas>=2.0 \
            numpy>=1.26 \
            scikit-learn>=1.3 \
            mlflow>=2.0 \
            pyarrow>=14.0 \
            dash>=2.17 \
            plotly>=5.22

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Ruff — lint scripts
        run: ruff check scripts/ tests/ dashboard/

      - name: Ruff — format check (new scripts only)
        run: |
          ruff format --check \
            scripts/0.generate_sample_data.py \
            scripts/6.train_forecast.py \
            scripts/7.inference.py \
            tests/ dashboard/

      # ── Type-check ─────────────────────────────────────────────────────────
      - name: Mypy — training script
        run: mypy scripts/6.train_forecast.py --ignore-missing-imports --no-strict-optional

      - name: Mypy — inference script
        run: mypy scripts/7.inference.py --ignore-missing-imports --no-strict-optional

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Pytest
        run: pytest tests/ -v --tb=short
